<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time-Crystalline Biology — Science Coherence Institute</title>
  <!-- Critical: prevent flash by redirecting before render -->
  <script>
    (function() {
      // Detection: screen width, touch support, user-agent
      var w = window.innerWidth || screen.width;
      var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      var ua = navigator.userAgent.toLowerCase();
      var uaMobile = /android|iphone|ipad|ipod|blackberry|windows phone|mobile/i.test(ua);

      // Threshold: anything under 768px OR touch device with narrow screen
      var isMobile = (w < 768) || (hasTouch && w < 1024) || uaMobile;

      // Check for manual override via localStorage (so users can switch)
      var override = localStorage.getItem('sci-coh-layout');
      if (override === 'desktop') isMobile = false;
      if (override === 'mobile')  isMobile = true;

      // Redirect — use replace() so back button works cleanly
      if (isMobile) {
        window.location.replace('mobile.html');
      } else {
        window.location.replace('desktop.html');
      }
    })();
  </script>
  <!-- Fallback if JS is disabled -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=desktop.html">
  </noscript>
  <style>
    /* Loading state while redirect fires — matches site palette */
    body {
      background: #040508;
      margin: 0; padding: 0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Cinzel', serif;
    }
    .loader {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .loader-ring {
      width: 40px; height: 40px;
      border: 1px solid rgba(58,148,136,.2);
      border-top-color: rgba(90,184,170,.6);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loader-text {
      font-size: 8px; letter-spacing: .5em;
      color: rgba(58,148,136,.4);
      text-transform: uppercase;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Coherence</div>
  </div>
</body>
</html>
